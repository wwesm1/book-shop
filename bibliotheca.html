<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bibliotheca — A Fine Bookshop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- ════════════════════════════════════════
       BACKGROUND LAYERS
       ════════════════════════════════════════ -->
  <div class="bg-layer"><canvas id="starCanvas"></canvas></div>
  <div class="bg-blobs"></div>

  <!-- ════════════════════════════════════════
       NAVBAR
       ════════════════════════════════════════ -->
  <nav class="navbar">

    <!-- Top row: Logo · Search · Actions -->
    <div class="navbar__top">

      <a class="logo" href="#" aria-label="Bibliotheca home">
        <div class="logo__icon">B</div>
        <span class="logo__name">Biblio<em>theca</em></span>
      </a>

      <div class="search-wrap">
        <input
          id="searchInput"
          class="search-input"
          type="search"
          placeholder="Search by title or author…"
          autocomplete="off"
          aria-label="Search books"
        />
        <span class="search-icon" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
      </div>

      <div class="nav-actions">
        <!-- Liked -->
        <button class="nav-btn" id="likeNavBtn" title="Liked books" aria-label="Open liked books">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
          <span class="badge" id="likeBadge">0</span>
        </button>
        <!-- Cart -->
        <button class="nav-btn" id="cartNavBtn" title="Shopping cart" aria-label="Open cart">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <span class="badge" id="cartBadge">0</span>
        </button>
      </div>

    </div><!-- /navbar__top -->

    <!-- Bottom row: Filters & Sort (catalogue) -->
    <div class="navbar__bottom">

      <div class="filter-group" data-group="language">
        <span class="filter-label">Lang</span>
        <button class="filter-btn active" data-val="all">All</button>
        <button class="filter-btn" data-val="english">English</button>
        <button class="filter-btn" data-val="russian">Russian</button>
        <button class="filter-btn" data-val="uzbek">Uzbek</button>
      </div>

      <div class="filter-group" data-group="genre">
        <span class="filter-label">Genre</span>
        <button class="filter-btn active" data-val="all">All</button>
        <button class="filter-btn" data-val="science">Science</button>
        <button class="filter-btn" data-val="romance">Romance</button>
        <button class="filter-btn" data-val="fantasy">Fantasy</button>
        <button class="filter-btn" data-val="programming">Programming</button>
        <button class="filter-btn" data-val="psychology">Psychology</button>
      </div>

      <div class="filter-group" data-group="price">
        <span class="filter-label">Price</span>
        <button class="filter-btn active" data-val="all">All</button>
        <button class="filter-btn" data-val="cheaper">Under $25</button>
        <button class="filter-btn" data-val="expensive">$25 & Up</button>
      </div>

      <div class="filter-group" data-group="sort">
        <span class="filter-label">Sort</span>
        <button class="filter-btn active" data-val="default">Default</button>
        <button class="filter-btn" data-val="az">A → Z</button>
        <button class="filter-btn" data-val="za">Z → A</button>
      </div>

    </div><!-- /navbar__bottom -->

  </nav><!-- /navbar -->

  <!-- ════════════════════════════════════════
       MAIN — Book Catalogue
       ════════════════════════════════════════ -->
  <main>
    <div class="section-header">
      <div>
        <h1 class="section-title">Our <em>Catalogue</em></h1>
        <p class="section-sub">Handpicked titles from around the world</p>
      </div>
      <div class="book-count-pill"><b id="bookCount">0</b> books found</div>
    </div>

    <div class="books-grid" id="booksGrid"></div>
  </main>

  <!-- ════════════════════════════════════════
       TOAST CONTAINER
       ════════════════════════════════════════ -->
  <div class="toast-wrap" id="toastWrap" aria-live="polite"></div>

  <!-- ════════════════════════════════════════
       LIKED MODAL
       ════════════════════════════════════════ -->
  <div class="modal-backdrop" id="likeModal" role="dialog" aria-label="Liked books">
    <div class="modal">
      <div class="modal-head">
        <h2>Liked Books</h2>
        <button class="modal-close-btn" data-modal="likeModal" aria-label="Close">✕</button>
      </div>
      <div class="modal-body" id="likeModalBody"></div>
    </div>
  </div>

  <!-- ════════════════════════════════════════
       CART MODAL
       ════════════════════════════════════════ -->
  <div class="modal-backdrop" id="cartModal" role="dialog" aria-label="Shopping cart">
    <div class="modal">
      <div class="modal-head">
        <h2>Shopping Cart</h2>
        <button class="modal-close-btn" data-modal="cartModal" aria-label="Close">✕</button>
      </div>
      <div class="modal-body" id="cartModalBody"></div>
      <div class="modal-foot" id="cartFoot" style="display:none">
        <div class="modal-total">Total: <strong id="cartTotal">$0.00</strong></div>
        <button class="modal-checkout-btn">Checkout →</button>
      </div>
    </div>
  </div>

  <button class="scroll-top-btn" id="scrollBtn" title="Back to top" aria-label="Scroll to top">↑</button>

  <script src="script.js"></script>
</body>
</html>
